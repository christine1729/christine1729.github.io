<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography — Christine Hu</title>
  <meta name="description" content="Landscape and travel photography — SF, Dolomites, Yosemite, and beyond.">
  <link rel="icon" href="/tiger.ico">
  <link rel="stylesheet" href="/assets/css/main.css">
  <style>
    .gallery {
      columns: 2;
      column-gap: 16px;
      margin-top: 32px;
    }
    @media (max-width: 640px) {
      .gallery {
        columns: 1;
      }
    }
    .gallery img {
      width: 100%;
      display: block;
      margin-bottom: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .gallery img:hover {
      opacity: 0.9;
    }
    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.active {
      display: flex;
    }
    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 4px;
    }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      color: #fff;
      font-size: 32px;
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0.7;
      z-index: 1001;
    }
    .lightbox-close:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <div class="container">
      <a href="/" class="nav-logo">Christine Hu</a>
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/blog.html">Writing</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/photography.html" class="active">Photography</a></li>
        <li><a href="https://github.com/christine1729" target="_blank" rel="noopener noreferrer" class="gh-link" aria-label="GitHub"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg></a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="section" style="padding-top: 80px;">
      <div class="container" style="max-width: 960px;">
        <p class="section-label">Gallery</p>
        <h1 class="section-title">Photography</h1>
        <p style="font-size: 15px; color: var(--gray-500); margin-top: 8px;">SF, Dolomites, Yosemite, and wherever the trail goes.</p>

        <div class="gallery">
          <img src="/photography/DSC05800.jpg" alt="" loading="lazy">
          <img src="/photography/DSC00352.jpg" alt="" loading="lazy">
          <img src="/photography/DSC05974.jpg" alt="" loading="lazy">
          <img src="/photography/DSC00494.jpg" alt="" loading="lazy">
          <img src="/photography/DSC04039.jpg" alt="" loading="lazy">
          <img src="/photography/DSC00503.jpg" alt="" loading="lazy">
          <img src="/photography/Snapseed.jpg" alt="" loading="lazy">
          <img src="/photography/IMG_3571.jpg" alt="" loading="lazy">
          <img src="/photography/DSC01363_SnapseedCopy.jpg" alt="" loading="lazy">
          <img src="/photography/IMG_9698.JPG" alt="" loading="lazy">
          <img src="/photography/IMG_9700.JPG" alt="" loading="lazy">
          <img src="/photography/IMG_9701.jpg" alt="" loading="lazy">
          <img src="/photography/IMG_9702.JPG" alt="" loading="lazy">
          <img src="/photography/IMG_1450.PNG" alt="" loading="lazy">
        </div>
      </div>
    </section>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <img src="" alt="">
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <span class="footer-left">Christine Hu &copy; 2025</span>
      <ul class="footer-links">
        <li><a href="https://github.com/christine1729" target="_blank" rel="noopener noreferrer">GitHub</a></li>
        <li><a href="/">Home</a></li>
      </ul>
    </div>
  </footer>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');

    document.querySelectorAll('.gallery img').forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightbox.classList.add('active');
      });
    });

    lightbox.addEventListener('click', () => {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
      }
    });
  </script>

</body>
</html>
